[package]
name = "mzidentml"
version = "0.1.0"
edition = "2021"

[dependencies]
num-bigint = "0.4"
num-traits = "0.2"
pyo3 = { version = ">=0.25", features = ["extension-module"] }
pyo3-polars = { version = ">=0.22", features = ["serde"] }
xsd-parser = { version = "1.2.0", features = ["reqwest", "async", "update-expectations", "web-resolver", "tokio"] }
polars = { version = ">=0.35", features = ["lazy", "ndarray", "strings", ] }
rustyms = "0.7.0"
