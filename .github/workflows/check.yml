name: Check Build

on:
  push:
    branches:
      - development
      - main
  pull_request:
    branches:
      - development
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-rust:
    name: Cargo Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Cargo check
        run: cargo check --all-targets --all-features

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build wheels (Check Only)
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --out /tmp/dist --find-interpreter
          sccache: 'true'
          manylinux: auto

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build wheels (Check Only)
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --out /tmp/dist --find-interpreter
          sccache: 'true'

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build wheels (Check Only)
        uses: PyO3/maturin-action@v1
        with:
          target: x64
          args: --out /tmp/dist --find-interpreter
          sccache: 'true'
