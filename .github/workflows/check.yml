name: Check Build

on:
  push:
    branches:
      - development
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
      - '**.txt'
      - 'Cargo.lock'
  pull_request:
    branches:
      - development
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
      - '**.txt'
      - 'Cargo.lock'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  check-rust:
    name: Cargo Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Cargo test
        run: cargo test --all-targets --all-features

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Build wheels (Check Only)
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --out /tmp/dist --find-interpreter
          manylinux: auto

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Build wheels (Check Only)
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --out /tmp/dist --find-interpreter

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: x64
      - name: Build wheels (Check Only)
        uses: PyO3/maturin-action@v1
        with:
          target: x64
          args: --out /tmp/dist --find-interpreter

  test-python:
    name: Test Python ${{ matrix.python-version }} (Polars ${{ matrix.polars-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        polars-version: [
          "1.28.0",
          "1.30.0",
          "latest"
        ]
        python-version: [
          "3.10",
          "3.14",
          "3.14t"
        ]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils
      - name: Build and Test
        run: |
          pip install pipenv
          pipenv install
          # Override polars version for testing cross-version compatibility
          if [ "${{ matrix.polars-version }}" != "latest" ]; then
            pipenv run pip install "polars==${{ matrix.polars-version }}"
          else
            pipenv run pip install -U polars
          fi
          pipenv run maturin develop
          pipenv run pytest tests/
